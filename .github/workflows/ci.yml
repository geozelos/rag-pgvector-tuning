name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Pytest with coverage
        run: uv run pytest tests/ -q --cov=rag --cov-branch

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies (dev)
        run: uv sync --group dev

      - name: Bandit (Python static analysis)
        run: uv run bandit -r src/rag scripts -ll -c pyproject.toml

      - name: pip-audit (dependency CVEs)
        run: |
          uv export --frozen --no-dev --no-emit-project --no-hashes -o /tmp/deps-audit.txt
          uv run pip-audit -r /tmp/deps-audit.txt

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag -d rag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      INTEGRATION_DATABASE_URL: postgresql://rag:rag@localhost:5432/rag

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Integration tests (PostgreSQL + pgvector)
        run: uv run pytest tests/test_integration_api.py -m integration -q --no-cov
